<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y2K Party</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="wrapper">
        <audio id="music" loop>
        <source src="LMFAO_GoonRock_Lauren_Bennett_-_Party_Rock_Anthem_47961219.mp3" type="audio/mpeg">
    </audio>

    <!-- 🔊 Кнопка -->
    <button class="music-btn" onclick="toggleMusic()">
        🔊 MUSIC
    </button>
        <!-- Десктоп версия -->
        <img src="97ae57d8-5155-49ce-9c49-42092fd7beb5.png" class="bg desktop">

        <!-- Мобильная версия -->
        <img src="8fd9c5d5-cdd2-4fa0-b0d2-380ca5387676.png" class="bg mobile">

        <!-- КНОПКИ -->

        <!-- Вишлист Коли -->
        <a href="https://ohmywishes.com/users/idr64m6a" class="btn btn-kolya">Вишлист Коли</a>

        <!-- Вишлист Шурика -->
        <a href="https://ohmywishes.com/users/shimqa5727" class="btn btn-shurik">Вишлист Шурика</a>

        <!-- TG ссылка -->
        <a href="https://t.me/+WVG4ShpHcuFlZWIy" class="btn btn-tg">Перейти в чат</a>

    </div>
    
    <script>
        const audio = document.getElementById("music");
        const btn = document.querySelector(".music-btn");

        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                btn.classList.add("off");
                btn.innerText = "🔇 OFF";
            } else {
                audio.play();
                btn.classList.remove("off");
                btn.innerText = "🔊 MUSIC";
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>

</html>
